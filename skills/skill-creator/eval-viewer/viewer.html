<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Skill-Creator Eval Review</title>
  <style>
    body { font-family: sans-serif; margin: 1.5em; }
    h1 { color: #2c3e50; }
    pre { background: #f5f5f5; padding: 1em; overflow: auto; }
  </style>
</head>
<body>
  <h1>Skill-Creator Eval Review</h1>
  <p>This viewer reads <code>feedback.json</code> via a relative path under
  the same directory. Open this file via <code>file://</code>.</p>
  <pre id="feedback">Loading...</pre>
  <script>
    fetch('feedback.json')
      .then(function(r) { return r.json(); })
      .then(function(j) {
        document.getElementById('feedback').textContent = JSON.stringify(j, null, 2);
      })
      .catch(function(e) {
        document.getElementById('feedback').textContent = 'Error: ' + e;
      });
  </script>
</body>
</html>
