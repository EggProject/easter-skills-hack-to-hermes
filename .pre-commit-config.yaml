# .pre-commit-config.yaml — CANONICAL UNIFIED (Phase 5b)
#
# Strictest hooks per docs/plans/00-index.md Hard constraints +
# docs/plans/10-toolchain-and-conventions.md D1. Unified across
# all 6 phase5 worktrees (B-plugin, C-script-1, D-script-2, E-skill,
# F-meta, G-report). Per operator instruction: strictest settings,
# uniform across workstreams.
#
# SCOPE: runs on src/, tests/, tools/. EXCLUDES docs/research/ which
# is vendored upstream skill-creator reference (never edited).
#
# HOOKS (in order of strictness):
#   1. wemake-python-styleguide (rev 1.6.2) — strictest Python linter
#   2. flake8 (strictest) — secondary strictest Python lint
#   3. ruff + ruff-format — fast lint + format
#   4. black — secondary formatter
#   5. mypy --strict — static type check
#   6. check-line-count (F-meta local) — per-file cap + footer + budget table + per-cell

exclude: ^docs/research/

repos:
  - repo: local
    hooks:
      # DEVIATION (JUSTIFIED, operator-authorized): check_bilingual hook removed
      # because the skill-creator migration stays English-only (user decision
      # recorded in plan D25 — "csak angol verzio kell"). The hook was an
      # organizational preference for Hungarian-English bilingual console output
      # in the previous Hermes port; the migrated skill does not require
      # localization. See ~/.claude/plans/frolicking-coalescing-reef.md D25.
      - id: check-line-count
        name: Per-file 500-line cap + plan footer drift + budget table Total + per-cell guard
        entry: python3 tools/check_line_count.py --enforce-footer --enforce-budget-table --enforce-per-cell
        language: system
        files: '^(src/|tests/|tools/|docs/plans/).*\.(py|md)$'
        pass_filenames: false

  - repo: https://github.com/wemake-services/wemake-python-styleguide
    rev: 1.6.2
    hooks:
      - id: wemake-python-styleguide
        args:
          - --max-line-length=120
        files: '^src/.*\.py$'

  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args:
          - --max-line-length=120
          - --max-complexity=10
          - --select=E,W,F,C
          - --extend-select=B,PIE,Q,I,N,D,SIM,RSE,RET,ARG,SLF
          - --show-source
          - --statistics
        files: '^src/.*\.py$'

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.9
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
        files: '^(src/|tests/|tools/).*\.py$'
      - id: ruff-format
        files: '^(src/|tests/|tools/).*\.py$'

  - repo: https://github.com/psf/black
    rev: 25.11.0
    hooks:
      - id: black
        language_version: python3.14
        args: ["--line-length=120"]
        files: '^(src/|tests/|tools/).*\.py$'

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies: [click, ruamel.yaml, types-PyYAML, pytest, python-frontmatter]
        args: ["--strict"]
        files: '^src/.*\.py$'
