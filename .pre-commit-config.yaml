repos:
  # Local hooks (check-line-count, check-bilingual, check-migration-note) are
  # owned by F-meta. They are intentionally omitted from this worktree's
  # pre-commit config because their tools/ directory does not exist yet
  # (F-meta has not landed). F-meta will add the hooks when its work merges.
  #
  # Scoped to B-plugin owned files only (src/hermes_skill_creator_plugin/__init__.py,
  # _advisory.py, i18n/messages_en.py, i18n/messages_hu.py, plugin.yaml, and tests/
  # added by this workstream). Excludes docs/research/* which is upstream reference
  # material owned by E-skill.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix"]
        files: '^(src/hermes_skill_creator_plugin/(?:__init__|_advisory)\.py|src/hermes_skill_creator_plugin/i18n/.*\.py|tests/.*\.py)$'
      - id: ruff-format
        files: '^(src/hermes_skill_creator_plugin/(?:__init__|_advisory)\.py|src/hermes_skill_creator_plugin/i18n/.*\.py|tests/.*\.py)$'
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3.11
        files: '^(src/hermes_skill_creator_plugin/(?:__init__|_advisory)\.py|src/hermes_skill_creator_plugin/i18n/.*\.py|tests/.*\.py)$'
  # mypy on B-plugin owned files: uses a local wrapper that sets MYPYPATH=src
  # and invokes mypy on the owned files. Wrapper is at tools/mypy_wrapper.sh.
  - repo: local
    hooks:
      - id: mypy
        name: mypy (B-plugin owned files)
        entry: bash tools/mypy_wrapper.sh
        language: system
        pass_filenames: false
        types: [python]
        files: '^src/hermes_skill_creator_plugin/(?:__init__|_advisory)\.py$'
  # wemake-python-styleguide (strictest). Required by 00-index.md Hard constraints
  # and 10-toolchain-and-conventions.md D1. Scoped to B-plugin owned files.
  - repo: https://github.com/wemake-services/wemake-python-styleguide
    rev: 1.6.2
    hooks:
      - id: wemake-python-styleguide
        files: '^(src/hermes_skill_creator_plugin/(?:__init__|_advisory)\.py|src/hermes_skill_creator_plugin/i18n/.*\.py|tests/.*\.py)$'
