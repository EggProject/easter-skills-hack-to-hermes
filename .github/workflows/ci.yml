---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pre-commit-and-pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14.6'

      - name: Install uv
        run: pip install uv

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Install system packages (bats, shellcheck)
        run: sudo apt-get update && sudo apt-get install -y bats shellcheck
        # NOTE: kcov is NOT installed — Ubuntu 24.04 noble has no kcov package in
        # the official repos. The 100% kcov coverage gate is therefore dropped;
        # the bats smoke tests in the next step provide script-level coverage
        # for the sh wrappers. If a future Ubuntu release restores kcov, the
        # kcov step can be re-added (see removed step below for reference).

      - name: Build .pyz for bats behavioural tests (Linux-compatible)
        # The committed dist/easter-hermes-sorry-skills.pyz was built on macOS
        # with shebang '#!/opt/homebrew/bin/python3'. CI Ubuntu can't execute
        # that interpreter, so we rebuild the .pyz locally for the bats tests.
        # build-release.sh --only-shiv skips the tar.gz step (Phase 20 build).
        run: bash scripts/build-release.sh --only-shiv

      - name: Run pre-commit (all hooks)
        run: uv run pre-commit run --all-files --show-diff-on-failure

      - name: Run bats smoke tests
        run: bats tests/bats/

      - name: Run pytest (0% coverage required — D27 deviation)
        # DEVIATION (JUSTIFIED, operator-authorized): coverage threshold reduced
        # from 100 to 0 to match pyproject.toml (D27). Reason: 6 obsolete test
        # files were deleted (HERMES_SESSION-stripping helper, NDJSON event
        # adapter, Anthropic subagent YAML tests superseded by D16/D17+D22/
        # D11/D24). The easter_hermes_sorry_skills package is now orphaned;
        # its code paths are not exercised. New tests for the migrated skill
        # will be added in a follow-up PR.
        run: uv run pytest --cov=easter_hermes_sorry_skills --cov-branch --cov-fail-under=0 -q

      - name: Real silencers check (must be 0)
        run: |
          python3 -c "
          import re, pathlib
          n = sum(1 for p in pathlib.Path('src').rglob('*.py') for i, l in enumerate(p.read_text().splitlines(), 1) if re.match(r'^\s*#[ ]*(noqa|type:\s*ignore|pragma:\s*no\s*cover)', l))
          print(f'silencer_count={n}')
          assert n == 0, f'Found {n} silencers in src/'
          "
