---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14.6'

      - name: Install uv
        run: pip install uv

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y bats shellcheck

      - name: Run pre-commit
        run: uv run --locked pre-commit run --all-files --show-diff-on-failure

  test-python:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14.6'

      - name: Install uv
        run: pip install uv

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Run pytest with 100% coverage
        run: uv run --locked pytest -q

  test-bats:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14.6'

      - name: Install uv
        run: pip install uv

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Build .pyz for wrapper smoke tests
        run: |
          uv pip install --quiet 'shiv>=1.0,<2.0'
          PYTHON="$(command -v python3)"
          PY_VERSION="$("${PYTHON}" -c 'import sys; print(f"{sys.version_info.major}.{sys.version_info.minor}")')"
          SITE_PACKAGES=".venv/lib/python${PY_VERSION}/site-packages"
          "${PWD}/.venv/bin/shiv" \
              --site-packages "${SITE_PACKAGES}" \
              --python "${PYTHON}" \
              --output-file "dist/easter-hermes-sorry-skills.pyz" \
              --reproducible \
              --compressed \
              .

      - name: Run bats smoke tests
        run: bats tests/bats/

  static-safety:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Real silencers check
        run: |
          python3 -c "
          import re, pathlib
          n = sum(1 for p in pathlib.Path('src').rglob('*.py') for i, l in enumerate(p.read_text().splitlines(), 1) if re.match(r'^\s*#[ ]*(noqa|type:\s*ignore|pragma:\s*no\s*cover)', l))
          print(f'silencer_count={n}')
          assert n == 0, f'Found {n} silencers in src/'
          "

  build-package:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14.6'

      - name: Install uv
        run: pip install uv

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Build release zipapp
        run: scripts/build-release.sh --only-shiv
